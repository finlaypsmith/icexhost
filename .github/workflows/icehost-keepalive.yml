name: IceHost Hourly KeepAlive

on:
  schedule:
    # ⏱️ 终极魔改：每 2 小时运行一次，且在每小时的第 25 分钟发射（避开整点排队高峰）
    - cron: '25 */2 * * *'
  workflow_dispatch: # 由外部定时（如 cron-job.org）进行每小时触发

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 核心改变：安装 seleniumbase 代替 playwright
          pip install seleniumbase requests

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.1

      - name: Run check script
        env:
          ICEHOST_SERVER_URL: ${{ secrets.ICEHOST_SERVER_URL }}
          ICEHOST_COOKIES: ${{ secrets.ICEHOST_COOKIES }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python icehost_run.py

      - name: Update ICEHOST_COOKIES secret
        if: always()
        env:
          # 需自建 Fine-grained PAT，仅授权本仓库 Secrets: Read and write，存为 GH_PAT
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f new_cookies.json ]; then
            gh secret set ICEHOST_COOKIES < new_cookies.json
            echo "✅ 已用最新 Cookie 覆盖更新 ICEHOST_COOKIES secret。"
          else
            echo "ℹ️ 未生成 new_cookies.json（登录可能失效或异常），跳过更新。"
          fi

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: icehost-debug-screenshot
          path: icehost_debug_screenshot.png
          if-no-files-found: ignore
